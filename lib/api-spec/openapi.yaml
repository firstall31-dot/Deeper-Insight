  # ─── FAWRY / RECHARGE ─────────────────────────────────────────
  /fawry/balance:
    get:
      operationId: getFawryBalance
      tags: [fawry]
      summary: Get current Fawry balance summary
      responses:
        "200":
          description: Fawry balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FawryBalance"
    post:
      operationId: addFawryBalance
      tags: [fawry]
      summary: Record received balance from agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FawryBalanceInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FawryBalance"

  /fawry/transactions:
    get:
      operationId: listFawryTransactions
      tags: [fawry]
      responses:
        "200":
          description: Fawry transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FawryTransaction"
    post:
      operationId: createFawryTransaction
      tags: [fawry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
