kind = "web"
previewPath = "/"
title = "Mobile Shop Manager"
version = "1.0.0"
id = "artifacts/mobile-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24566

[services.development]
run = "pnpm --filter @workspace/mobile-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-shop", "run", "build" ]
publicDir = "artifacts/mobile-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24566"
BASE_PATH = "/"
